<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="x-ogp-key" content="955b3319-da54-4f51-b86f-4727ab509997" id="ogp-key-meta" />
    <title>CapyWheels</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='31' fill='%231e272e'/><circle cx='32' cy='32' r='28' fill='%232c3e50' stroke='%23f39c12' stroke-width='2'/><circle cx='20' cy='46' r='8' fill='%23111' stroke='%23f1c40f' stroke-width='2'/><circle cx='44' cy='46' r='8' fill='%23111' stroke='%23f1c40f' stroke-width='2'/><circle cx='20' cy='46' r='3' fill='%23fff'/><circle cx='44' cy='46' r='3' fill='%23fff'/><rect x='16' y='24' width='32' height='18' rx='6' fill='%238e5a36'/><rect x='34' y='16' width='18' height='16' rx='5' fill='%23a06a42'/><rect x='44' y='22' width='10' height='10' rx='3' fill='%236e4020'/><circle cx='50' cy='25' r='1.5' fill='%23000'/><path d='M 39 22 Q 42 20 45 22' fill='none' stroke='%232c3e50' stroke-width='2' stroke-linecap='round'/><circle cx='42' cy='27' r='2.5' fill='%23ff7675'/><ellipse cx='34' cy='18' rx='3' ry='5' fill='%236e4020'/><circle cx='40' cy='11' r='4' fill='%23e67e22'/><path d='M 40 7 Q 41 5 42 6' fill='none' stroke='%2327ae60' stroke-width='1.5'/></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="ui">
        <div id="brand">🛞 CAPYWHEELS</div>

        <div class="audio-controls">
            <button id="musicToggleBtn" class="audio-btn">🎵 Music: ON</button>
            <button id="sfxToggleBtn" class="audio-btn">🔊 SFX: ON</button>
        </div>

        <div class="hud-item">SCORE</div>
        <div class="hud-value"><span id="scoreDisplay">000000</span> <span id="multBadge" class="hidden">×1</span></div>

        <div class="hud-item">DISTANCE</div>
        <div class="hud-value"><span id="distDisplay">0m</span></div>

        <div class="hud-item">MOMENTUM</div>
        <div class="bar-container">
            <div id="momentumBar"></div>
        </div>
    </div>

    <!-- Combo popup -->
    <div id="comboDisplay" class="hidden"></div>

    <!-- Touch hint (mobile only) -->
    <div id="touchHint">← STEER &nbsp;|&nbsp; TAP CENTER = GAS &nbsp;|&nbsp; STEER →</div>

    <!-- Overlay Screens -->
    <div id="screen-overlay" class="overlay">

        <!-- Main Menu -->
        <div id="menu-content" class="content">
            <h1>CAPYWHEELS</h1>
            <p class="subtitle">Don't lose your momentum.<br>Grab 🍊 Oranges. Dodge 🍌 Bananas.</p>
            <button id="startBtn">START RIDE</button>
            <div class="controls-hint">
                <kbd>W</kbd> / <kbd>↑</kbd> Throttle &nbsp;
                <kbd>A</kbd><kbd>D</kbd> / <kbd>←</kbd><kbd>→</kbd> Steer &nbsp;
                <kbd>S</kbd> / <kbd>↓</kbd> Brake
            </div>
        </div>

        <!-- Game Over -->
        <div id="gameover-content" class="content hidden">
            <h1 class="danger">CRASHED!</h1>
            <p class="subtitle">Your momentum bottomed out.</p>
            <div class="score-line">Score: <span id="finalScore">0</span></div>
            <div class="highscore-line">Best: <span id="highScore">0</span></div>
            <button id="restartBtn">RIDE AGAIN</button>
        </div>

    </div>

    <script type="module">
        import { Game } from './Game.js';
        window.addEventListener('DOMContentLoaded', () => {
            const game = new Game();
            game.init();
        });
    </script>
</body>
</html>
